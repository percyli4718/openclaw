# 保客通 (BaokeTong) 私有化部署配置
# 适用于大型企业客户，独立 PostgreSQL 实例

version: '3.8'

services:
  # PostgreSQL 15 - 独立数据库实例
  postgres:
    image: postgres:15
    container_name: baoke-tong-postgres-private
    restart: unless-stopped
    environment:
      POSTGRES_DB: baoke_tong
      POSTGRES_USER: ${POSTGRES_USER:-baoke_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./sql/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-baoke_admin} -d baoke_tong"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - baoke-tong-network
    # 生产环境资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  # Redis 7 - 缓存和会话存储
  redis:
    image: redis:7-alpine
    container_name: baoke-tong-redis-private
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - baoke-tong-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Qdrant 1.7 - 向量数据库
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: baoke-tong-qdrant-private
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - baoke-tong-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # 后端服务（多副本）
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: baoke-tong-backend-private
    restart: unless-stopped
    environment:
      # 数据库配置
      DATABASE_URL: postgresql://${POSTGRES_USER:-baoke_admin}:${POSTGRES_PASSWORD}@postgres:5432/baoke_tong
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      QDRANT_URL: http://qdrant:6333

      # AI 模型配置（私有化模式使用 Ollama）
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}

      # 应用配置
      APP_ENV: ${APP_ENV:-production}
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # 多租户配置
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../baoke_tong:/app/baoke_tong:ro
      - ../api:/app/api:ro
      - ../models:/app/models:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - baoke-tong-network
    deploy:
      replicas: ${BACKEND_REPLICAS:-2}
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: baoke-tong-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - baoke-tong-network
    profiles:
      - with-nginx

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  baoke-tong-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
