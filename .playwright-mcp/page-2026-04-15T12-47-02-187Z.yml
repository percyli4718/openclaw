                - heading "Hermes Agent vs OpenClaw：一个会自我进化的AI助手，正在撼动“龙虾”的地位" [level=2] [ref=e329]:
                  - link "Hermes Agent vs OpenClaw：一个会自我进化的AI助手，正在撼动“龙虾”的地位" [ref=e330] [cursor=pointer]:
                    - /url: https://www.cnblogs.com/ghj1976/p/19832817
                    - heading "Hermes Agent vs OpenClaw：一个会自我进化的AI助手，正在撼动“龙虾”的地位" [level=2] [ref=e331]
                - text: Posted on 2026-04-08 03:54
                - link "蝈蝈俊" [ref=e332] [cursor=pointer]:
                  - /url: https://www.cnblogs.com/ghj1976
                - text: 阅读(1422) 评论(0)
                - link "收藏" [ref=e333] [cursor=pointer]:
                  - /url: javascript:void(0)
                - link "举报" [ref=e334] [cursor=pointer]:
                  - /url: https://report.cnblogs.com?targetLink=https%3A%2F%2Fwww.cnblogs.com%2Fghj1976%2Fp%2F19832817&targetId=19832817&targetType=0
              - generic [ref=e335]:
                - generic [ref=e336]:
                  - blockquote [ref=e337]:
                    - paragraph [ref=e338]: 两个开源AI智能体，一个靠生态，一个靠进化。
                  - paragraph [ref=e339]:
                    - text: 今年2月底，AI研究实验室Nous Research悄悄开源了一个名为
                    - strong [ref=e340]: Hermes Agent
                    - text: 的项目。短短不到两个月，它在GitHub上的星标数已经逼近三万，成为OpenClaw上线以来
                    - strong [ref=e341]: 第一个真正意义上的竞争对手
                    - text: 。
                  - paragraph [ref=e342]: 而OpenClaw，这只被开发者们亲切称为“龙虾”的开源智能体，短短4个月就斩获超过25万GitHub星标，超越React和Linux内核，登顶全球开源项目榜首。
                  - paragraph [ref=e343]:
                    - img "assets/Hermes Agent vs OpenClaw：一个会自我进化的AI助手，正在撼动“龙虾”的地位/3D卡通渲染风格助手形象图生成.png" [ref=e344]
                  - paragraph [ref=e345]:
                    - text: 两者都是自托管的开源智能体，都能接入Telegram、Discord、Slack、WhatsApp等聊天平台，都支持多模型切换，都走MIT协议。但剥开这层相似的外壳，它们的
                    - strong [ref=e346]: 设计哲学截然不同
                    - text: —— 一个是“网关”，一个是“引擎”。
                  - heading "01 核心定位：网关 vs 引擎" [level=2] [ref=e347]
                  - paragraph [ref=e348]:
                    - text: OpenClaw的核心是一个
                    - strong [ref=e349]: Gateway（网关守护进程）
                    - text: ，采用“中心辐射式架构”（hub-and-spoke），负责统一管理会话、路由和渠道连接。它就像一个AI领域的“总调度室”，把你的各种聊天应用连接到AI智能体，所有消息都经由中央网关统一管控。
                  - paragraph [ref=e350]:
                    - text: 你可以把它理解为一个
                    - strong [ref=e351]: “多渠道个人助理操作系统”
                    - text: —— 管理员可以通过一个界面监控所有会话和工具调用，这在团队协作场景下尤其高效。
                  - paragraph [ref=e352]:
                    - text: Hermes Agent走的则是另一条路。它的核心是
                    - strong [ref=e353]: Agent自身的执行循环
                    - text: ，采用“同心增长式架构”（concentric growth）—— Agent自己就是核心引擎。它不是围绕“怎么把消息送到Agent”来设计的，而是围绕
                    - strong [ref=e354]: “Agent怎么变得越来越强”
                    - text: 来设计的。
                  - paragraph [ref=e355]:
                    - text: 官方把这种设计称为
                    - strong [ref=e356]: closed learning loop（闭环学习循环）
                    - text: 。简单说，Hermes Agent是一个会“自我成长”的智能体，而不是一个单纯的调度中心。
                  - blockquote [ref=e357]:
                    - paragraph [ref=e358]:
                      - text: 一句话总结：
                      - text: OpenClaw = 集中管控，适合团队协作；
                      - text: Hermes Agent = 个人成长，适合长期陪伴。
                  - heading "02 技能系统：应用商店 vs 自学成才" [level=2] [ref=e359]
                  - paragraph [ref=e360]: 这是两者差异最大的地方。
                  - paragraph [ref=e361]:
                    - strong [ref=e362]: OpenClaw的技能系统，像一个App Store。
                    - text: 你浏览、下载、安装别人做好的技能。截至2026年3月，它的技能市场ClawHub上已有超过13,700个技能，覆盖Notion、Gmail、GitHub等50多种工具集成。数量多，开箱即用。
                  - paragraph [ref=e363]:
                    - text: 但这种“应用商店”模式有一个致命隐患 ——
                    - strong [ref=e364]: 安全审查形同虚设
                    - text: 。2026年3月，安全研究人员发现了名为ClawHavoc的大规模攻击活动。在审计的2,890个流行技能中，41%存在安全漏洞，30.6%是高危或严重级别，大约每12个技能包中就有1个携带恶意代码。
                  - paragraph [ref=e365]: 更离谱的是，被删除的恶意技能中有34%换了个名字又重新上架了。
                  - paragraph [ref=e366]:
                    - strong [ref=e367]: Hermes的技能系统，则像一个每次做完菜就发明新菜谱的厨师。
                    - text: 它不依赖别人做的技能包。当你完成一个包含5次以上工具调用的复杂任务后，Hermes会主动问自己：这个模式值得记住吗？如果是，它会自动创建一份结构化的技能文档（SKILL.md），存成可复用的技能。
                  - paragraph [ref=e368]:
                    - text: 更关键的是，这些技能在使用过程中会
                    - strong [ref=e369]: 自我迭代
                    - text: 。如果Agent在执行技能时发现了更好的方法，它会自动更新技能文档。有Reddit用户反馈，Agent在两小时内自动生成了三份技能文档后，重复性研究任务的速度提升了
                    - strong [ref=e370]: 40%
                    - text: 。
                  - blockquote [ref=e371]:
                    - paragraph [ref=e372]:
                      - text: 技能系统一句话对比：
                      - text: OpenClaw是“下载别人写好的技能”，
                      - text: Hermes是“自己写技能并持续优化”。
                  - heading "03 记忆体系：笔记本 vs 搜索引擎" [level=2] [ref=e373]
                  - paragraph [ref=e374]: 两者都声称有跨会话记忆能力，但实现方式迥异。
                  - paragraph [ref=e375]:
                    - strong [ref=e376]: OpenClaw的记忆是“文件即记忆”。
                    - text: 它把记忆存在两个地方：MEMORY.md存长期关键事实，每日日志（memory/YYYY-MM-DD.md）存会话级上下文。问题是 —— 只有最近两天的日志会在会话开始时自动加载。更早的日志虽然存在磁盘上，但Agent需要主动搜索才能调用，而在实际使用中它并不会持续地、正确地这样做。上下文积累越多，检索越困难。
                  - paragraph [ref=e377]:
                    - strong [ref=e378]: Hermes则给Agent装了一个“搜索引擎式的大脑”
                    - text: ，采用四层记忆架构：提示记忆（MEMORY.md和USER.md）、会话存档（SQLite全文检索）、技能记忆、用户建模
                    - link:
                      - /url: https://vectorize.io/articles/openclaw-vs-hermes-agent-memory
                    - text: 。它还内置了一个nudge机制 —— 定期提醒Agent反思会话内容并保存重要信息
                    - link:
                      - /url: https://vectorize.io/articles/openclaw-vs-hermes-agent-memory
                    - text: 。
                  - paragraph [ref=e379]: 这种设计的实际效果是：OpenClaw像个“偶尔翻翻的笔记本”，Hermes则像个“随时可检索的数字大脑”。
                  - heading "04 安全思路：信任模型 vs 纵深防御" [level=2] [ref=e380]
                  - paragraph [ref=e381]: 安全问题是OpenClaw最大的软肋。
                  - paragraph [ref=e382]: 今年2月，OpenClaw被曝出多个高危漏洞：CVE-2026-25253（ClawJacked攻击，平均98秒即可破解本地网关密码）、路径遍历漏洞、任意代码执行漏洞……全球超过13.5万个OpenClaw实例暴露在公网上且无密码防护。
                  - paragraph [ref=e383]:
                    - text: Gartner直接给出评价：
                    - strong [ref=e384]: “风险不可接受”
                    - text: 。Cisco安全研究员则称其为“从功能上看是突破性的，但从安全上看是噩梦”。
                  - paragraph [ref=e385]:
                    - text: Hermes则从设计之初就考虑了安全问题。它搞了一套
                    - strong [ref=e386]: 五层纵深防御
                    - text: ：用户授权、危险命令审批、容器隔离、凭据过滤、上下文注入扫描。默认对高风险操作（如执行终端命令、写文件）需要人工审批，超时未批准就自动拒绝。纯Python代码库也更易于审计。
                  - blockquote [ref=e387]:
                    - paragraph [ref=e388]:
                      - text: 安全一句话：
                      - text: 如果你在本地跑着玩玩，两者都行；
                      - text: 如果你要接入真实的生产环境或敏感数据，Hermes的安全设计更让人安心。
                  - heading "05 部署与体验" [level=2] [ref=e389]
                  - paragraph [ref=e390]:
                    - strong [ref=e391]: OpenClaw
                    - text: 的生态成熟度是巨大优势。如果你需要快速集成大量第三方服务，或者需要管理一个由多个Agent协同工作的“AI团队”，OpenClaw仍然是当前最成熟的选择。
                  - paragraph [ref=e392]:
                    - strong [ref=e393]: Hermes
                    - text: 则在轻量化和稳定性上表现更出色。它在5美元一个月的VPS上就能流畅运行，支持Docker、SSH远程、Modal等serverless方案，安装只需要一行curl命令。许多开发者反馈，Hermes切换模型更流畅、工具调用更可靠，很少遇到OpenClaw中常见的崩溃和限流问题。
                  - paragraph [ref=e394]:
                    - text: 特别值得一提的是，Hermes官方提供了
                    - strong [ref=e395]:
                      - code [ref=e396]: hermes claw migrate
                    - text: 迁移工具，可以一键导入OpenClaw的配置、记忆、技能和API密钥。这意味着从OpenClaw切换过去的成本极低。
                  - heading "06 到底要不要换？给你一个简单决策指南" [level=2] [ref=e397]
                  - paragraph [ref=e398]:
                    - strong [ref=e399]: 你可能更适合继续用OpenClaw，如果：
                  - list [ref=e400]:
                    - listitem [ref=e401]:
                      - paragraph [ref=e402]: 你高度依赖其丰富的插件生态（但要注意安全风险）
                    - listitem [ref=e403]:
                      - paragraph [ref=e404]: 你需要管理多Agent团队协同工作
                    - listitem [ref=e405]:
                      - paragraph [ref=e406]: 你的工作流已经深度绑定OpenClaw，切换成本较高
                  - paragraph [ref=e407]:
                    - strong [ref=e408]: 你应该认真考虑切换到Hermes Agent，如果：
                  - list [ref=e409]:
                    - listitem [ref=e410]:
                      - paragraph [ref=e411]: 你渴望一个“越用越懂你”的专属助手，而不是每次都要从头教
                    - listitem [ref=e412]:
                      - paragraph [ref=e413]: 你的工作涉及敏感数据，对安全性有较高要求
                    - listitem [ref=e414]:
                      - paragraph [ref=e415]: 你希望用更低的硬件成本获得更稳定的运行体验
                    - listitem [ref=e416]:
                      - paragraph [ref=e417]: 你是Python开发者，倾向于维护一个易于理解和二次开发的代码库
                    - listitem [ref=e418]:
                      - paragraph [ref=e419]: 你对“技能自我进化”这个概念感到兴奋，想亲身体验
                  - paragraph [ref=e420]:
                    - strong [ref=e421]: 最后的忠告：
                    - text: 如果你之前用OpenClaw主要图它能调用Claude Code的授权，现在授权用不了了，试试Hermes Agent是个不错的选择。如果你只是日常使用已经顺手，那也不必折腾——工具终究是为工作流服务的。
                  - paragraph [ref=e422]:
                    - text: 但有一件事是确定的：Hermes Agent的出现，标志着AI智能体从“功能堆砌”走向“自我进化”的范式转变。
                    - strong [ref=e423]: 越用越聪明的AI，不再是科幻。
                  - paragraph [ref=e424]: 两者的github地址：
                  - list [ref=e425]:
