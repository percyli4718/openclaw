              - heading "01 2026 AI 框架双雄：Hermes vs OpenClaw" [level=2] [ref=e129]
              - paragraph [ref=e130]: 2026 年 3 月，AI Agent 框架圈同时冒出两个"狠角色"。
              - paragraph [ref=e131]:
                - text: 一边是
                - generic [ref=e135] [cursor=pointer]: Hermes Agent
                - text: ——NousResearch 出品，两周狂揽
                - generic [ref=e137]: 52k Stars
                - generic [ref=e138]:
                  - text: ，主打"与你共同成长"的
                  - generic [ref=e140] [cursor=pointer]: 自我进化
                  - text: 概念；另一边是
                - generic [ref=e142]: OpenClaw
                - text: （前身为 Clawdbot/Moltbot），GitHub 星标突破
                - generic [ref=e143]: 354 k
                - text: ，号称"史上增长最快的开源项目"，核心卖点是本地优先、企业级能力。
              - img "图片" [ref=e145]
              - paragraph [ref=e146]
              - paragraph [ref=e147]:
                - text: 两个框架都支持多平台消息接入、都有工具调用能力、都强调可扩展性。但深入对比后会发现：
                - generic [ref=e148]: 它们走的是完全不同的技术路线，面向的是截然不同的用户群体。
              - paragraph [ref=e149]: "\"Hermes 像是个会进化的数字伙伴，OpenClaw 更像是个可靠的企业级基础设施。\""
              - paragraph [ref=e150]: 本文将从架构设计、核心能力、学习曲线、适用场景四个维度，深度对比这两个框架，帮你做出正确的技术选型。
              - heading "02 架构对比：自我进化 vs 本地优先" [level=2] [ref=e151]
              - heading "🔴 Hermes Agent：Self-Improving Agent Runtime" [level=3] [ref=e152]
              - paragraph [ref=e153]:
                - text: Hermes 的架构设计围绕一个核心理念：
                - generic [ref=e154]: Agent 应该越用越聪明
                - text: 。
              - paragraph [ref=e155]:
                - text: 它的核心创新在于
                - generic [ref=e159] [cursor=pointer]: 闭环学习系统
                - text: ：
              - list [ref=e161]:
                - listitem [ref=e162]:
                  - generic [ref=e163]: 完成任务后自动生成可复用的 Skill
                - listitem [ref=e164]:
                  - generic [ref=e165]: 每次执行都是训练数据，Skill 会持续迭代优化
                - listitem [ref=e166]:
                  - generic [ref=e167]: 跨会话持久化记忆，用 Honcho 做深度用户建模
                - listitem [ref=e168]:
                  - generic [ref=e169]: 支持 batch trajectory generation，为下一代模型准备训练数据
              - paragraph [ref=e170]: 架构分层：
              - list [ref=e171]:
                - listitem [ref=e172]:
                  - strong [ref=e173]: run_agent.py - 核心 Agent 编排循环
                - listitem [ref=e174]:
                  - strong [ref=e175]: cli.py / gateway/ - 双入口（CLI + 消息平台）共享同一核心
                - listitem [ref=e176]:
                  - strong [ref=e177]: hermes_state.py - SQLite 会话和状态存储
                - listitem [ref=e178]:
                  - strong [ref=e179]: environments/ - RL 环境、评测、数据生成
              - heading "🔵 OpenClaw：Local-First Enterprise Gateway" [level=3] [ref=e180]
              - paragraph [ref=e181]:
                - text: OpenClaw 的架构设计围绕另一个核心理念：
                - generic [ref=e182]: 数据不出本地，企业级可控
                - text: 。
              - paragraph [ref=e183]:
                - text: 它的核心创新在于
