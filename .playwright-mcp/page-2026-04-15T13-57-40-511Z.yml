                              - img
                            - generic: 本地（当然可以代理到云）网站预览
                          - paragraph: 我还做了一个很轻量的本地静态阅读网站。
                          - paragraph: 它不复杂，但很实用，支持：
                          - list:
                            - listitem: • 按抓取日期或发表日期筛选
                            - listitem: • 按关键词全文检索
                            - listitem: • 查看中文摘要
                            - listitem: • 查看作者单位
                            - listitem: • 收藏论文
                          - paragraph: 对于“先浏览一遍，再决定哪些要精读”这个场景，这种页面比直接翻 Excel 更舒服很多。
                          - separator
                          - heading "为什么我觉得 Hermes 很适合做这类项目" [level=3]
                          - paragraph: 我做完这个项目之后，最大的感受其实不是“LLM 能总结论文”，而是：
                          - paragraph: Hermes 非常适合承接这种长期运行、跨多步骤、带真实外部投递的 agent 任务。
                          - paragraph: 因为这类任务本身就很符合 agent 的优势：
                          - list:
                            - listitem: • 有明确目标
                            - listitem: • 有固定流程
                            - listitem: • 需要工具调用
                            - listitem: • 需要消息投递
                            - listitem: • 需要定时运行
                            - listitem: • 需要状态延续
                          - paragraph: 如果没有 Hermes，这个项目当然也能做，但很容易退化成：
                          - list:
                            - listitem: • 一堆脚本
                            - listitem: • 一堆路径配置
                            - listitem: • 一堆手工部署说明
                            - listitem: • 一堆人肉操作
                          - paragraph: 而有了 Hermes skill 之后，它的形态就完全不一样了：
                          - paragraph: 你不是在“部署一个脚本仓库”，而是在“安装一个可执行的 agent workflow”。
                          - paragraph: 这也是我觉得这个项目最有意思的地方。
                          - separator
                          - heading "适合哪些人用" [level=3]
                          - paragraph: 我觉得这个项目比较适合下面几类人：
                          - list:
                            - listitem: • 需要长期跟踪某个 arXiv 方向的研究者
                            - listitem: • 想把论文监控接到飞书群或个人会话的人
                            - listitem: • 想做一个自己的“论文情报流”系统的人
                            - listitem: • 对 Hermes skill / agent workflow 感兴趣的人
                          - paragraph: 虽然我默认配置的是 LLM 量化，但它其实不局限于量化。
                          - paragraph:
                            - text: 只要改一下
                            - code: search_keywords.txt
                            - text: ，就能切到别的主题，比如：
                          - list:
                            - listitem: • 多模态
                            - listitem: • Agent
                            - listitem: • 推理模型
                            - listitem: • RAG
                            - listitem: • AI Infra
                          - separator
                          - heading "如果你也想试一下" [level=3]
                          - paragraph: 最简单的方式还是那句：
                          - paragraph: 在 Hermes 对话里直接说：
                          - generic:
                            - generic:
                              - code: 请从该地址 https://github.com/genggng/hermes-arxiv-agent/blob/main/AGENT_SKILL.md 安装 skill 并执行。
                          - paragraph: 如果你的 Hermes 和 Feishu 已经打通，基本就能把整条链路跑起来。
                          - separator
                          - heading "最后" [level=3]
                          - paragraph: 我越来越觉得，接下来很多个人自动化项目都会走向一个共同方向：
                          - paragraph:
                            - text: 不是“写一个工具”，
                            - text: 而是“做一个能被 agent 接管的 workflow”。
                          - paragraph:
                            - code: hermes-arxiv-agent
                            - text: 对我来说，就是这个方向上的一次比较完整的实践。
                          - paragraph:
                            - text: 它不是一个巨大的系统，也不是一个炫技 demo。
                            - text: 它只是把一件我真的每天会做、而且真的很烦的事情，交给 Hermes 持续稳定地做下去。
                          - paragraph: 如果你也在折腾：
                          - list:
                            - listitem: • 论文监控
                            - listitem: • agent 自动化
                            - listitem: • Hermes skill
                            - listitem: • 飞书工作流
                          - paragraph: 那这个项目也许会对你有点帮助。
