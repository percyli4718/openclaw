                      - generic [ref=e238]:
                        - generic:
                          - paragraph: 应评论区老哥要求，我将本地静态网站推送到 github page了， 每天早上 9 点会更新页面（不出问题的话😂），不想折腾只想关注最新 llm 量化论文的可以点这里：
                          - generic:
                            - link:
                              - /url: https://link.zhihu.com/?target=https%3A//genggng.github.io/hermes-arxiv-agent/
                          - separator
                          - paragraph: 最近我一直在折腾一件很具体的小事：
                          - paragraph: 怎么把“每天追踪 arXiv 上的新论文”这件事，做成一个真正可以长期稳定运行、而且几乎不需要人工维护的系统。
                          - paragraph: 我的目标不是单纯写一个爬虫，也不是只做一个摘要脚本，而是把整条链路串起来：
                          - list:
                            - listitem: • 每天自动搜索指定方向的新论文
                            - listitem: • 自动下载 PDF
                            - listitem: • 自动生成中文摘要
                            - listitem: • 自动补全作者单位
                            - listitem: • 自动推送到飞书
                            - listitem: • 自动沉淀到本地数据表
                            - listitem: • 自动同步到一个本地静态阅读网站
                          - paragraph: 最后，我把它做成了一个基于 Hermes 的 agent skill：
                          - paragraph: 项目名叫 hermes-arxiv-agent。
                          - paragraph: 一句话概括就是：
                          - paragraph: 这是一个基于 Hermes 的 agent skill，可以每天自动从 arXiv 抓取论文，用 AI 生成中文摘要和作者单位，推送到飞书，并提供一个本地静态阅读网站。
                          - separator
                          - heading "最让我满意的一点：一句话安装" [level=3]
                          - paragraph: 我觉得这个项目最有意思的地方，不是“它能抓论文”，而是它已经不是传统意义上的“脚本项目”了。
                          - paragraph: 它的理想使用方式，不是让用户：
                          - list:
                            - listitem: 自己 clone 仓库
                            - listitem: 自己安装依赖
                            - listitem: 自己修改路径
                            - listitem: 自己写 cron
                            - listitem: 自己配置推送目标
                          - paragraph: 而是直接在 Hermes 对话里说一句话：
                          - generic:
                            - generic:
                              - code: 请从该地址 https://github.com/genggng/hermes-arxiv-agent/blob/main/AGENT_SKILL.md 安装 skill 并执行。
                          - paragraph: 然后 Hermes 会自己完成：
                          - list:
                            - listitem: • 克隆仓库
                            - listitem: • 安装 Python 依赖
                            - listitem: • 生成定时任务 prompt
                            - listitem: • 创建 cron job
                            - listitem: • 把定时任务的投递目标设为 Feishu
                          - paragraph: 这也是我为什么一直强调它是一个 Hermes skill，而不只是一个 Python 仓库。
                          - paragraph: 最近 Hermes 本身也越来越火，大家已经不满足于“写个 agent demo”了，而是开始在意：
                          - list:
                            - listitem: • 能不能长期运行
                            - listitem: • 能不能和真实消息渠道打通
                            - listitem: • 能不能把部署复杂度降下来
                            - listitem: • 能不能从一次性脚本变成稳定的 agent workflow
                          - paragraph: 这个项目本质上就是在往这个方向走。
                          - separator
                          - heading "我为什么要做这个项目" [level=3]
                          - paragraph: 做这个项目的直接原因很简单：
                          - paragraph: 我平时会关注 LLM 量化相关论文，但每天去刷 arXiv 很低效。
                          - paragraph: 真正烦人的不是“看论文”本身，而是下面这些重复劳动：
                          - list:
                            - listitem: • 每天去搜关键词
                            - listitem: • 判断哪些是新增
                            - listitem: • 下载 PDF
                            - listitem: • 粗读 abstract
                            - listitem: • 识别作者单位
                            - listitem: • 整理成适合分享的内容
                            - listitem: • 再发到飞书或者做内部同步
                          - paragraph: 如果只是偶尔做一次，这些步骤不算什么。
                          - paragraph: 但只要变成“每天都做”，它就很值得自动化。
                          - paragraph:
                            - text: 于是我开始搭这个系统，并且在过程中越来越明确：
                            - text: 这件事应该让 Hermes agent 来接管，而不是停留在“脚本 + 手工补全”的阶段。
                          - separator
                          - heading "这个项目具体做了什么" [level=3]
                          - paragraph: 整个系统大概分成三层。
                          - heading "1. 数据抓取层" [level=3]
                          - paragraph:
                            - text: 每天定时执行
                            - code: monitor.py
                            - text: ，它会完成这些事情：
                          - list:
                            - listitem:
                              - text: • 读取
                              - code: search_keywords.txt
                            - listitem: • 调用 arXiv API 搜索最新论文
                            - listitem: • 做去重判断
                            - listitem: • 下载新论文 PDF
                            - listitem:
                              - text: • 更新
                              - code: papers_record.xlsx
                            - listitem:
                              - text: • 生成给 Hermes 使用的中间文件
                              - code: new_papers.json
                          - paragraph: 这里的默认监控方向是：
                          - list:
                            - listitem: • LLM 量化相关论文
                          - paragraph:
                            - text: 如果你想改成别的方向，只需要改
                            - code: search_keywords.txt
                            - text: 。
                          - paragraph: 这点我也专门写进了 skill，让 agent 在部署时就知道它默认监控的是量化方向。
                          - heading "2. Agent 补全层" [level=3]
                          - paragraph: 这是我觉得最关键的一层。
                          - paragraph: 单纯靠爬取拿到的只是：
                          - list:
                            - listitem: • 论文标题
                            - listitem: • 作者
                            - listitem: • 英文摘要
                            - listitem: • 分类
                            - listitem: • PDF 地址
                          - paragraph: 但真正适合每天阅读和推送的内容，还缺两样很重要的东西：
                          - list:
                            - listitem: • 作者单位
                            - listitem: • 高质量中文摘要
                          - paragraph: 这部分我没有硬编码成普通规则脚本，而是交给 Hermes / LLM 去完成。
                          - paragraph: 它会读取 PDF 前两页，尝试提取作者单位；然后基于英文 abstract 生成一段 90-150 字的中文总结。
                          - paragraph: 而且这个系统已经不再把“是否抓取过”和“是否完成 agent 补全”混为一谈了。
                          - paragraph: 我后来专门把这层状态拆开，增加了一个独立的待处理队列：
                          - list:
                            - listitem:
                              - text: •
                              - code: crawled_ids.txt
                              - text: ：表示论文已经抓取过
                            - listitem:
                              - text: •
                              - code: pending_llm_ids.txt
                              - text: ：表示论文还没完成 agent 补全
                          - paragraph: 这样就避免了一个常见问题：
                          - paragraph:
                            - text: 有时 Python 第一段已经下载了论文，但第二段 agent 总结还没跑完。
                            - text: 如果只看“是否抓取过”，后续定时任务就会把这篇论文错过。
                          - paragraph: 现在不会了。
                          - paragraph:
                            - text: 只要一篇论文还没补全
                            - code: affiliations
                            - text: 和
                            - code: summary_cn
                            - text: ，它就会继续留在待处理队列里，直到真正完成为止。
                          - heading "3. 展示与分发层" [level=3]
                          - paragraph: 当论文补全结束后，系统会继续完成两个动作：
                          - list:
                            - listitem: • 生成飞书日报
                            - listitem:
                              - text: • 重建本地阅读网站的数据文件
                              - code: viewer/papers_data.json
                          - paragraph: 这样一来，数据不会只停留在 Excel 里，而是会自动同步到前端阅读页。
                          - separator
                          - heading "现在实际长什么样" [level=3]
