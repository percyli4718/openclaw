          - list [ref=e138]:
            - listitem [ref=e139]:
              - strong [ref=e140]: A closed learning loop
              - text: — Agent-curated memory with periodic nudges, autonomous skill creation, skill self-improvement during use, FTS5 cross-session recall with LLM summarization, and
              - link "Honcho" [ref=e141] [cursor=pointer]:
                - /url: https://github.com/plastic-labs/honcho
              - text: dialectic user modeling
            - listitem [ref=e142]:
              - strong [ref=e143]: Runs anywhere, not just your laptop
              - text: "— 6 terminal backends: local, Docker, SSH, Daytona, Singularity, Modal. Daytona and Modal offer serverless persistence — your environment hibernates when idle, costing nearly nothing"
            - listitem [ref=e144]:
              - strong [ref=e145]: Lives where you do
              - text: — CLI, Telegram, Discord, Slack, WhatsApp, Signal, Matrix, Mattermost, Email, SMS, DingTalk, Feishu, WeCom, BlueBubbles, Home Assistant — 15+ platforms from one gateway
            - listitem [ref=e146]:
              - strong [ref=e147]: Built by model trainers
              - text: — Created by
              - link "Nous Research" [ref=e148] [cursor=pointer]:
                - /url: https://nousresearch.com
              - text: ", the lab behind Hermes, Nomos, and Psyche. Works with"
              - link "Nous Portal" [ref=e149] [cursor=pointer]:
                - /url: https://portal.nousresearch.com
              - text: ","
              - link "OpenRouter" [ref=e150] [cursor=pointer]:
                - /url: https://openrouter.ai
              - text: ", OpenAI, or any endpoint"
            - listitem [ref=e151]:
              - strong [ref=e152]: Scheduled automations
              - text: — Built-in cron with delivery to any platform
            - listitem [ref=e153]:
              - strong [ref=e154]: Delegates & parallelizes
              - text: — Spawn isolated subagents for parallel workstreams. Programmatic Tool Calling via
              - code [ref=e155]: execute_code
              - text: collapses multi-step pipelines into single inference calls
            - listitem [ref=e156]:
              - strong [ref=e157]: Open standard skills
              - text: — Compatible with
              - link "agentskills.io" [ref=e158] [cursor=pointer]:
                - /url: https://agentskills.io
              - text: . Skills are portable, shareable, and community-contributed via the Skills Hub
            - listitem [ref=e159]:
              - strong [ref=e160]: Full web control
              - text: — Search, extract, browse, vision, image generation, TTS
            - listitem [ref=e161]:
              - strong [ref=e162]: MCP support
              - text: — Connect to any MCP server for extended tool capabilities
            - listitem [ref=e163]:
              - strong [ref=e164]: Research-ready
              - text: — Batch processing, trajectory export, RL training with Atropos. Built by
              - link "Nous Research" [ref=e165] [cursor=pointer]:
                - /url: https://nousresearch.com
              - text: — the lab behind Hermes, Nomos, and Psyche models
