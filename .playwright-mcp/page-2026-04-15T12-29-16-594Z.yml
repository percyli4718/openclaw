          - paragraph [ref=e29]:
            - text: The self-improving AI agent built by
            - link "Nous Research" [ref=e30] [cursor=pointer]:
              - /url: https://nousresearch.com
            - text: . The only agent with a built-in learning loop — it creates skills from experience, improves them during use, nudges itself to persist knowledge, and builds a deepening model of who you are across sessions.
