          - paragraph [ref=e36]:
            - text: It's not a coding copilot tethered to an IDE or a chatbot wrapper around a single API. It's an
            - strong [ref=e37]: autonomous agent
            - text: that gets more capable the longer it runs. It lives wherever you put it — a $5 VPS, a GPU cluster, or serverless infrastructure (Daytona, Modal) that costs nearly nothing when idle. Talk to it from Telegram while it works on a cloud VM you never SSH into yourself. It's not tied to your laptop.
