                      - generic "市场高开低走，深成指跌近1%。创业板指盘中刷新2015年6月19日以来新高，随后震荡下挫跌超1%止步5连阳。沪深两市成交额2.42万亿，较上一个交易日放量315亿。盘面上，市场热点较为杂乱，全市场超3500只个股下跌。从板块来看，医药板块逆势拉升，哈药股份（sh600664）2连板，津药药业（sh600488）、博瑞医药（sh688166）、金陵药业（sz000919）、鹭燕医药（sz002788）均涨停。算力租赁概念反复走强，利通电子（sh603629）2连板，协创数据（sz300857）、宏景科技（sz301396）大涨续创历史新高。商业航天概念表现活跃，神剑股份（sz002361）涨停创历史新高，华菱线缆（sz001208）涨停。下跌方面，锂电池概念集体调整，海科新源（sz301292）跌超12%，孚日股份（sz002083）跌停，华盛锂电（sh688353）跌超8%。算力硬件方向冲高回落，特发信息（sz000070）、新易盛（sz300502）、仕佳光子（sh688313）纷纷下挫。存储芯片概念走弱，大为股份（sz002213）触及跌停。" [ref=e1008]
