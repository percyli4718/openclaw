                - listitem [ref=e1016]:
                  - link "北京红竹 北京红竹今天 15:57:47 沪指60日均线为中线多空分界线，自从跌破之后沪指就进入了空头态势，而现在反弹即将到60日均线，自然就成为了压力。从3794点以来的反弹到现在4000点上方，很有散户从不相信到相信，甚至于还看反转。怎么看待市场都可以，但要有自己的交易模式和体系。按照缠论的交易体系，我们在低位3794点的时候考虑怎么做加法的事，那时很多人恐慌，而反弹到现在很多人又要贪婪了，我们就要考虑怎么做减法的事了。毕竟低位买高位卖，这逻辑没毛病。目前缠论给出的防守线依然还是3966点，若明天沪指再新高，防守线还将继续上移。至于还能反弹到哪里，那是市场的事，我们只需要盯好防守线就好。跌破我们的认知内的反弹结束，不跌破反弹还可以继续。这就是红竹在晚上直播的时候经常讲解的小级别移动止盈，不用猜顶部在哪里，也不知道猜哪里去卖，只要盯好止盈位就可以。方法一样，自己可以对照找找自己的品种的止盈位。大白话：反弹进入末端，盯好防守线。" [ref=e1017] [cursor=pointer]:
