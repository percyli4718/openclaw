                - paragraph [ref=e291]: 几个关键差异点：
                - paragraph [ref=e292]: 1. 自我改进能力
                - paragraph [ref=e293]: 这是 Hermes 最大的护城河。其他 Agent（包括 Claude Code）都是无状态或被动记忆型——你告诉它记住什么，它才记。Hermes 会自己判断什么信息值得记住，自动写入 MEMORY.md；完成复杂任务后，自动把流程提炼成 SKILL.md 文件；下次遇到类似任务，直接调用，还能根据新情况更新技能。
                - paragraph [ref=e294]: 用社区的话说：”做复杂任务时会自动创建技能，自我改进是真的。”
                - paragraph [ref=e295]: 2. 消息平台覆盖
                - paragraph [ref=e296]: Hermes 原生支持 12 个消息平台：Telegram、Discord、Slack、WhatsApp、Signal、钉钉、飞书、Email、Home Assistant、Webhook、API Server、CLI TUI。所有平台通过单一 Gateway 进程统一管理。
                - paragraph [ref=e297]: Claude Code 通过 Channels 插件支持部分平台，DeerFlow 支持 3 个，其余全部 CLI only。
                - paragraph [ref=e298]: 这意味着 Hermes 可以真正做到”长在你手机里”——你在 Telegram 上发条消息，它在后台跑任务，完成后把结果发回来。不需要打开终端，不需要守着屏幕。
                - paragraph [ref=e299]: 3. 模型无关 + 研究就绪
                - paragraph [ref=e300]: 18+ 提供商支持：Nous Portal（400+ 模型）、OpenRouter（200+ 模型）、Anthropic、OpenAI、HuggingFace、DeepSeek、智谱 AI、Kimi、MiniMax、阿里通义千问、GitHub Copilot 等。
                - paragraph [ref=e301]: 支持本地推理（Ollama、vLLM、llama.cpp），无需任何付费 API。
                - paragraph [ref=e302]: 还集成了 RL 训练环境（Atropos）、轨迹压缩用于训练数据生产、WandB 实验追踪——这不仅是用户工具，也是训练下一代工具调用模型的数据飞轮。
                - paragraph [ref=e303]: Hermes vs DeerFlow 2.0 的取舍：
                - paragraph [ref=e304]: DeerFlow 2.0 是字节开源的”Super Agent Harness”，53K Stars。两者差异在于架构复杂度和使用门槛：
                - list [ref=e305]:
                  - listitem [ref=e306]: • DeerFlow 2.0 是框架级产品，基于 LangGraph 构建，提供从 Agent 编排、记忆、沙箱（Docker/K8s）到 IM 集成的完整企业级基础设施。支持 Guardrails 安全防护、LangSmith 可观测性。但复杂度极高，配置项繁多，学习曲线陡峭。
                  - listitem [ref=e307]: • Hermes 是产品级工具，开箱即用（curl | bash 一键安装），不需要 LangGraph/LangChain 知识。更像一个”长在你手机里的 AI 助手”，通过 Telegram 等平台随时触达，拥有自我改进能力，适合个人和小团队。
