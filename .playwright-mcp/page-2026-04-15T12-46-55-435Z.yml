                - paragraph [ref=e338]: Hermes vs Goose / Codex CLI / Gemini CLI / aider：
                - paragraph [ref=e339]: 这四个项目都是编码/终端 Agent，定位与 Hermes 有本质差异：
                - list [ref=e340]:
                  - listitem [ref=e341]: • 它们都没有自我改进能力——无法自动创建技能并在使用中改进
                  - listitem [ref=e342]: • Goose 最接近 Hermes 的模型自由度（30+ Provider），且 MCP 原生设计最彻底
                  - listitem [ref=e343]: • Gemini CLI Stars 最多（100K），但完全锁定 Google Gemini 模型
                  - listitem [ref=e344]: • Codex CLI 有最好的沙箱安全（macOS Seatbelt），但偏向 OpenAI 生态
                  - listitem [ref=e345]: • aider 的 Repo Map（tree-sitter 代码库索引）是独特的竞争力，专精结对编程
                - separator [ref=e346]
                - heading "三、学习系统详解：Hermes 的护城河" [level=2] [ref=e347]
                - paragraph [ref=e348]: Hermes 宣称的”自我改进”能力，核心来自它的多层记忆系统。
                - heading "3.1 核心记忆：MEMORY.md" [level=3] [ref=e349]
                - paragraph [ref=e350]:
                  - text: 记忆工具的存储方案出人意料地简单——纯 Markdown 文件。Agent 的持久化记忆写在
                  - code [ref=e351]: ~/.hermes/memory/MEMORY.md
                  - text: 中，每条记忆是一个时间戳标记的 Markdown 段落。
                - paragraph [ref=e352]:
                  - text: 记忆工具注册了三个操作：
                  - code [ref=e353]: save
                  - text: （保存新记忆）、
                  - code [ref=e354]: search
                  - text: （搜索现有记忆）、
                  - code [ref=e355]: delete
                  - text: （删除记忆）。在实现上，
                  - code [ref=e356]: save
                  - text: 就是向文件追加一段带时间戳的 Markdown；
                  - code [ref=e357]: search
                  - text: 是对文件内容做关键词匹配；
                  - code [ref=e358]: delete
                  - text: 则移除匹配的段落。
                - paragraph [ref=e359]: 这个设计的核心优势是可审计性——用户可以直接打开 MEMORY.md 查看 Agent 记住了什么，甚至手动编辑。相比向量数据库的黑箱，这对用户信任至关重要。
                - heading "3.2 会话搜索：SQLite FTS5" [level=3] [ref=e360]
                - paragraph [ref=e361]:
                  - code [ref=e362]: session_search_tool.py
                  - text: 实现了跨会话的全文检索，让 Agent 能够回忆过去的对话。技术上使用 SQLite 的 FTS5 虚拟表：
                - code [ref=e365]: CREATE VIRTUAL TABLE IF NOT EXISTS session_fts USING fts5(session_id, role, content, timestamp, tokenize='porter unicode61')
                - paragraph [ref=e366]:
                  - code [ref=e367]: porter unicode61
                  - text: 分词器同时支持英文词干提取和 Unicode（包括中文）。每个会话结束时，对话消息被写入 FTS5 索引。
                - paragraph [ref=e368]:
                  - text: 搜索时，工具先通过 FTS5 的
                  - code [ref=e369]: MATCH
                  - text: 语法检索相关消息，然后调用辅助 LLM 对检索结果做摘要，提炼出与当前问题最相关的信息。
                - paragraph [ref=e370]: 这个”检索 + LLM 摘要”的两阶段设计是 RAG 的经典模式。FTS5 的优势在于零外部依赖、毫秒级查询、支持中文，且 SQLite 文件天然具备可移植性。
                - heading "3.3 Honcho 用户建模：辩证式画像" [level=3] [ref=e371]
                - paragraph [ref=e372]: Honcho 是 Plastic Labs 开发的用户建模引擎。这里需要重点解释”辩证法建模”到底是什么意思。
                - paragraph [ref=e373]: 什么是辩证法用户建模？
                - paragraph [ref=e374]: 传统的用户画像是累积式的：每次观察到一个新事实（”用户喜欢 Python”），就加一条记录。随着时间推移，画像膨胀且可能自相矛盾（”用户喜欢 Python”和一周后的”用户开始转向 Rust”并存）。
                - paragraph [ref=e375]: Honcho 的辩证法借鉴了黑格尔的”正 - 反 - 合”逻辑：
                - list [ref=e376]:
                  - listitem [ref=e377]: • 正题（Thesis）：当前对用户的理解（画像的现状）
                  - listitem [ref=e378]: • 反题（Antithesis）：新的对话中出现了与当前理解矛盾或补充的信息
                  - listitem [ref=e379]: • 合题（Synthesis）：用 LLM 将正题和反题融合，生成一个更新的、更准确的用户理解
                - paragraph [ref=e380]: 这个过程由 Honcho 服务端实现。Hermes Agent 通过 API 将对话数据发送给 Honcho，Honcho 在服务端用自己的 LLM 执行辩证推理，返回更新后的用户画像。
                - paragraph [ref=e381]: 具体运转流程：
                - code [ref=e384]: "[Agent 对话] [Honcho 服务端] │ │ 1. 对话结束时，Agent 发送消息历史到 Honcho ├────────────────────────────────────▶│ │ │ 2. Honcho 从消息中提取新的用户观察（反题） │ │ 3. Honcho 取出当前用户画像（正题） │ │ 4. Honcho 用 LLM 将正题 + 反题融合为新画像（合题） │ 5. 下次对话开始时，Agent 请求 Honcho 上下文 ├────────────────────────────────────▶│ │◀────────────────────────────────────┤ 6. 返回融合后的用户画像 │ 注入到系统提示中"
                - paragraph [ref=e385]: 举个例子：
                - list [ref=e386]:
                  - listitem [ref=e387]: • 第 1 天：用户让 Agent 帮忙写 Python 脚本。Honcho 生成正题：”用户是 Python 开发者，偏好脚本化任务”
                  - listitem [ref=e388]: • 第 5 天：用户开始讨论 Rust 的内存安全。这成为反题，与”纯 Python 开发者”矛盾
                  - listitem [ref=e389]: • 辩证融合：Honcho 的 LLM 重新推理生成合题：”用户是有 Python 背景的系统程序员，正在向 Rust 转型，关注性能和安全性”
                - paragraph [ref=e390]: 这个合题比分别罗列事实更有价值——它捕捉了用户的发展趋势和动机。
                - paragraph [ref=e391]: 用户画像的数据结构：
                - paragraph [ref=e392]: Honcho 返回的画像用自然语言描述，可以直接注入到 LLM 的系统提示中，无需额外的格式转换。画像内容类似于：
                - code [ref=e395]: This user is an experienced Python developer transitioning to systems programming with Rust. They value code correctness and performance. They prefer concise explanations with code examples over lengthy theoretical discussions. They work on backend services and have recently started exploring WebAssembly.
                - paragraph [ref=e396]: Hermes Agent 端的集成实现：
                - paragraph [ref=e397]: 在 Hermes Agent 这一侧，Honcho 的集成分为两层：
                - paragraph [ref=e398]:
                  - text: 工具层（
                  - code [ref=e399]: tools/honcho_tools.py
                  - text: ）注册四个操作供 Agent 主动使用：
                - list [ref=e400]:
                  - listitem [ref=e401]:
                    - text: •
                    - code [ref=e402]: honcho_context
                    - text: ：获取当前对话的上下文增强信息
                  - listitem [ref=e403]:
                    - text: •
                    - code [ref=e404]: honcho_profile
                    - text: ：查询用户的完整画像
                  - listitem [ref=e405]:
                    - text: •
                    - code [ref=e406]: honcho_search
                    - text: ：在用户历史交互中搜索特定信息
                  - listitem [ref=e407]:
                    - text: •
                    - code [ref=e408]: honcho_conclude
                    - text: ：提交新的观察/结论，触发画像的辩证更新
                - paragraph [ref=e409]:
                  - text: 其中
                  - code [ref=e410]: honcho_conclude
                  - text: 是触发辩证循环的关键——当 Agent 在对话中观察到有价值的用户信息时，通过这个工具将观察提交给 Honcho 服务，Honcho 在服务端执行正 - 反 - 合的融合。
                - paragraph [ref=e411]:
                  - text: 自动注入层（
                  - code [ref=e412]: prompt_builder.py
                  - text: +
                  - code [ref=e413]: run_agent.py
                  - text: ）实现无感知的上下文增强：
                - code [ref=e416]: "# run_agent.py 中的 Honcho 上下文注入逻辑 if self._honcho_enabled: # 首轮对话：嵌入到系统提示中 if is_first_turn: system_prompt += f\"\\n\\n[User Context from Honcho]\\n{honcho_context}\" else: # 后续轮次：附加到用户消息中 # 这是为了不破坏 Anthropic 的 prompt cache 前缀命中 user_message_content = f\"{honcho_context}\\n\\n{original_user_message}\""
                - paragraph [ref=e417]: 首轮对话将 Honcho 上下文嵌入系统提示，让 Agent 从一开始就”认识”这个用户。后续轮次为了不破坏 Anthropic 的 prompt cache 前缀（系统提示变化会导致缓存失效），改为将 Honcho 上下文附加到用户消息中。
                - paragraph [ref=e418]: 为什么默认不启用？
                - paragraph [ref=e419]: Honcho 默认未启用，需要用户手动配置（设置 Honcho API key）。这是有意的设计：
                - list [ref=e420]:
                  - listitem [ref=e421]: 用户画像涉及隐私敏感数据，显式 opt-in 是负责任的做法
                  - listitem [ref=e422]: Honcho 是外部服务（由 Plastic Labs 运营），数据会发送到第三方
                  - listitem [ref=e423]: 辩证融合需要额外的 LLM 调用，有成本和延迟开销
                  - listitem [ref=e424]: 对于短期/一次性使用场景，用户建模的收益有限
                - heading "3.4 技能系统：Agent 的程序性知识" [level=3] [ref=e425]
                - paragraph [ref=e426]: 技能系统是 Hermes Agent”越用越聪明”承诺的核心载体。一个技能本质上是一段结构化的 Markdown 文档，描述了完成某类任务的知识和步骤。
                - paragraph [ref=e427]: 技能的文件结构：
                - code [ref=e430]: "skills/ ├── software-development/ │ ├── SKILL.md # 技能定义文档 │ └── templates/ # 可选的模板文件 ├── research/ │ ├── SKILL.md │ └── prompts/ └── creative/ └── SKILL.md"
                - paragraph [ref=e431]:
                  - code [ref=e432]: SKILL.md
                  - text: 遵循一个约定的 Markdown 结构：标题、触发条件（何时使用）、步骤说明、注意事项等。这个格式被设计为人机共读——Agent 能理解并执行，人也能直接阅读和编辑。
                - paragraph [ref=e433]: 技能的发现与加载：
                - paragraph [ref=e434]: 技能来源有三个层级：
                - list [ref=e435]:
                  - listitem [ref=e436]:
                    - text: 内置技能（
                    - code [ref=e437]: skills/
                    - text: 目录）：随项目发布的预置技能
                  - listitem [ref=e438]:
                    - text: 用户技能（
                    - code [ref=e439]: ~/.hermes/skills/
                    - text: ）：用户自定义或 Agent 自动创建的技能
                  - listitem [ref=e440]:
                    - text: 项目技能（
                    - code [ref=e441]: .hermes/skills/
                    - text: ）：项目级别的特定技能
                - paragraph [ref=e442]:
                  - text: 发现过程扫描这三个目录，收集所有
                  - code [ref=e443]: SKILL.md
                  - text: 文件。然后
                  - code [ref=e444]: prompt_builder.py
                  - text: 在构建系统提示时，将所有可用技能的索引（标题和触发条件的简要列表）注入系统提示。注意这里只注入索引而非完整内容——完整的技能文档太长，会浪费上下文窗口。
                - paragraph [ref=e445]:
                  - text: 当 Agent 在对话中判断某个技能与当前任务相关时，通过
                  - code [ref=e446]: skills_list
                  - text: 或
                  - code [ref=e447]: skill_view
                  - text: 工具加载该技能的完整内容。这是一种延迟加载策略，在上下文效率和信息可用性之间取得平衡。
                - paragraph [ref=e448]: 技能的自动创建：
                - paragraph [ref=e449]:
                  - text: 这是最令人兴奋的部分。
                  - code [ref=e450]: tools/skill_manager_tool.py
                  - text: 提供了
                  - code [ref=e451]: skill_manage
                  - text: 工具，支持
                  - code [ref=e452]: create
                  - text: 、
                  - code [ref=e453]: edit
                  - text: 、
                  - code [ref=e454]: delete
                  - text: 操作。当 Agent 完成一个复杂任务后，系统提示中的指导会提醒 Agent：如果这个任务的解决方案可能在未来被复用，应该将其沉淀为一个技能。
                - paragraph [ref=e455]:
                  - text: Agent 通过
                  - code [ref=e456]: skill_manage
                  - text: 工具的
                  - code [ref=e457]: create
                  - text: 操作，将解决方案写成结构化的
                  - code [ref=e458]: SKILL.md
                  - text: 文件，保存到用户技能目录。下次遇到类似任务时，技能索引中会出现这个新技能，Agent 可以加载并参考它。
                - paragraph [ref=e459]: 技能的自我改进：
                - paragraph [ref=e460]:
                  - text: 技能改进发生在使用过程中。当 Agent 加载并使用某个技能完成任务后，如果发现技能文档中的步骤不完整、有错误、或者可以优化，它会通过
                  - code [ref=e461]: skill_manage
                  - text: 的
                  - code [ref=e462]: edit
                  - text: 操作更新技能内容。
                - paragraph [ref=e463]: 这形成了一个正反馈循环：创建技能 → 使用技能 → 发现改进点 → 更新技能 → 下次使用更好的版本。这正是”The agent that grows with you”的含义。
                - paragraph [ref=e464]:
                  - generic [ref=e465]:
                    - link "http://agentskills.io" [ref=e466] [cursor=pointer]:
                      - /url: https://link.zhihu.com/?target=http%3A//agentskills.io
                      - text: http://agentskills.io
                    - text: 兼容性：
                - paragraph [ref=e467]:
                  - text: Hermes Agent 的技能格式遵循
                  - code [ref=e468]: agentskills.io
                  - text: 开放标准。这意味着为 Hermes 编写的技能可以被 Claude Code、Cursor、GitHub Copilot 等 11+ 工具识别和使用——技能真正实现了跨框架可移植。
                - separator [ref=e469]
                - heading "四、Hermes vs OpenClaw：怎么选?" [level=2] [ref=e470]
                - paragraph [ref=e471]: 适合 Hermes Agent 的场景：
                - list [ref=e472]:
                  - listitem [ref=e473]: • 需要一个长期使用、越用越聪明的个人 AI 助手
                  - listitem [ref=e474]: • 需要本地/私有化部署，零 API 成本
                  - listitem [ref=e475]: • 需要在 Telegram/Discord/Slack 等多平台随时触达 Agent
                  - listitem [ref=e476]: • 需要 Agent 具有持久记忆和自我改进能力
                  - listitem [ref=e477]: • 需要 research-ready 的 Agent 框架用于 RL 训练和数据生成
                - paragraph [ref=e478]: 不太适合的场景：
                - list [ref=e479]:
                  - listitem [ref=e480]: • 需要快速搭建多角色 Agent 团队
                  - listitem [ref=e481]: • 只需要最简单的 API 集成（OpenAI SDK 更轻量）
                - paragraph [ref=e482]: 总体评价：
                - paragraph [ref=e483]: Hermes Agent 的最大赌注是：Agent 的价值不仅在于单次任务完成，更在于长期积累的知识和对用户的理解。这是目前其他框架尚未涉足的方向。
                - paragraph [ref=e484]: 项目处于快速迭代期（一个月内 4 个 Release），17K Stars 和活跃社区表明市场认可度高。作为 Nous Research 这样的顶级开源模型实验室推出的产品，其在模型-Agent 协同优化上的潜力值得关注。
                - paragraph [ref=e485]: OpenClaw 是一把成熟的瑞士军刀，功能齐全，社区庞大。Hermes 是一个在成长的助手——今天比昨天多懂你一点，下个月比这个月更好用。
                - paragraph [ref=e486]: 如果你需要稳定开箱即用，选 OpenClaw。如果你愿意花五分钟装一个会学习的 Agent，试试 Hermes。
                - paragraph [ref=e487]: 反正迁移也就一行命令：
                - code [ref=e490]: hermes claw migrate
                - separator [ref=e491]
                - heading "五、参考资料" [level=2] [ref=e492]
