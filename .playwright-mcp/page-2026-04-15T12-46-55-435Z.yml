                - paragraph [ref=e105]: Nous Research 在开源圈子里名气不小，他们做的 Hermes 4 系列模型，很多人用过。这家实验室的起源挺有意思，2023 年从 Discord 社区里长出来的，一群 AI 爱好者草根协作，现在成了美国领先的开源 AI 研究实验室。
                - paragraph [ref=e106]: 创始人 Teknium 是 Hermes 模型的创造者，团队 18 名核心成员，刚拿了 5000 万美元 A 轮融资，投资方是 Paradigm 和 North Island Ventures。
                - paragraph [ref=e107]: Hermes Agent 是这个生态里的新成员。它不是第一个 Agent 框架，但可能是第一个把“自我改进”这件事做完整的。
