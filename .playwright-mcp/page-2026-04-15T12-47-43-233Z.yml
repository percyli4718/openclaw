                - paragraph [ref=e109]:
                  - text: Hermes Agent 是由
                  - link "Nous Research" [ref=e111] [cursor=pointer]:
                    - /url: https://zhida.zhihu.com/search?content_id=272942450&content_type=Article&match_order=1&q=Nous+Research&zd_token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJ6aGlkYV9zZXJ2ZXIiLCJleHAiOjE3NzY0MzAwNTgsInEiOiJOb3VzIFJlc2VhcmNoIiwiemhpZGFfc291cmNlIjoiZW50aXR5IiwiY29udGVudF9pZCI6MjcyOTQyNDUwLCJjb250ZW50X3R5cGUiOiJBcnRpY2xlIiwibWF0Y2hfb3JkZXIiOjEsInpkX3Rva2VuIjpudWxsfQ.zYYOd2WxMXWyi_EXCphKOS-MuVk0pyIuL48XDL0oGGg&zhida_source=entity
                    - text: Nous Research
                    - img [ref=e112]
                  - text: 开发的开源自主 AI 智能体，于 2026 年 2 月正式发布，其核心定位为 “与你共同成长的智能体”（The agent that grows with you）
                  - link "(1)" [ref=e114] [cursor=pointer]:
                    - /url: https://link.zhihu.com/?target=https%3A//hermes-agent.org/zh/about/
                  - text: 。与传统的 AI 聊天机器人或 IDE 绑定的代码补全工具不同，Hermes Agent 是一个运行在用户服务器上的自主智能体，具有持久记忆和自我改进能力，能够在运行过程中不断学习和进化。
                - paragraph [ref=e115]: Hermes Agent 的技术架构采用模块化单代理持久循环设计，核心是 run_agent.py 中的 AIAgent 类（约 9200 行代码），负责同步编排整个生命周期：输入→推理→工具执行→内存更新→输出。该系统支持 Linux、macOS 和 WSL2 平台，用户可以通过一条 curl 命令完成安装，无需任何前置依赖，体现了其设计的简洁性和易用性。
                - paragraph [ref=e116]:
