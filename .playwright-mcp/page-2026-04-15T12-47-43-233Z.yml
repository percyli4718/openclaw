                    - row "技术风险 中等（自进化可能出错） 低（架构成熟稳定）" [ref=e522]:
                      - cell "技术风险" [ref=e523]
                      - cell "中等（自进化可能出错）" [ref=e524]
                      - cell "低（架构成熟稳定）" [ref=e525]
                    - row "供应商风险 低（完全开源） 中等（依赖模型供应商）" [ref=e526]:
                      - cell "供应商风险" [ref=e527]
